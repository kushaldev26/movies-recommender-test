<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — Discover Movies You'll Love</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0a0f;
            --surface-color: #12121a;
            --border-color: #1e1e2e;
            --accent-color: #f5c518;
            --accent-glow: rgba(245, 197, 24, 0.15);
            --text-primary: #ffffff;
            --text-muted: #8b8b9a;
            --font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            
            /* Similarity match badges */
            --match-high: linear-gradient(135deg, #10b981 0%, #059669 100%);  /* Green */
            --match-mid: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);   /* Amber */
            --match-low: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);   /* Gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2e2e42;
        }

        /* 1. Full-width Hero Section */
        .hero {
            background: radial-gradient(circle at 50% 30%, #17162b 0%, var(--bg-color) 75%);
            padding: 5rem 1rem 4rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 60%, var(--bg-color));
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 40px rgba(245, 197, 24, 0.2);
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .hero p {
            color: var(--text-muted);
            font-size: 1.25rem;
            font-weight: 300;
            letter-spacing: 0.03em;
        }

        /* 2. Search Section */
        .search-section {
            max-width: 600px;
            width: 100%;
            margin: -2rem auto 3rem auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 10;
        }

        .search-form {
            display: flex;
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-form:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 25px var(--accent-glow), 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1.1rem;
            padding: 0.75rem 1.5rem;
            width: 100%;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-button {
            background: linear-gradient(135deg, var(--accent-color) 0%, #e2b107 100%);
            color: #050508;
            border: none;
            outline: none;
            padding: 0.75rem 1.75rem;
            border-radius: 25px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(245, 197, 24, 0.2);
        }

        .search-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(245, 197, 24, 0.35);
        }

        .search-button:active {
            transform: translateY(0);
        }

        /* Spinner */
        .spinner-container {
            display: none;
            justify-content: center;
            align-items: center;
            margin: 3rem 0;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(245, 197, 24, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-text {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 3. Results Section */
        .results-section {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 0 1.5rem 5rem 1.5rem;
            display: none; /* Shown dynamically */
        }

        .results-header {
            margin-bottom: 2rem;
            position: relative;
        }

        .results-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            display: inline-block;
        }

        .results-header::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: var(--accent-color);
            margin-top: 0.5rem;
            border-radius: 2px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 cols for wide screens */
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .results-grid {
                grid-template-columns: repeat(3, 1fr); /* 3 cols desktop/tablet large */
            }
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 cols tablet */
            }
        }

        @media (max-width: 480px) {
            .results-grid {
                grid-template-columns: 1fr; /* 1 col mobile */
            }
        }

        /* Movie Card Styling */
        .movie-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(30px);
        }

        /* Animation class applied in JS */
        .movie-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .movie-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 10px 25px rgba(245, 197, 24, 0.08), 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .poster-container {
            width: 100%;
            padding-top: 150%; /* 2:3 standard poster aspect ratio */
            position: relative;
            background-color: #0c0c12;
            overflow: hidden;
        }

        .movie-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.05);
        }

        .poster-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            text-align: center;
            box-sizing: border-box;
            background: linear-gradient(180deg, #161622 0%, #0d0d14 100%);
            z-index: 1;
            transition: opacity 0.3s ease;
        }

        .fallback-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .fallback-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .score-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #ffffff;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            letter-spacing: 0.02em;
        }

        .score-badge.high {
            background: var(--match-high);
        }

        .score-badge.mid {
            background: var(--match-mid);
        }

        .score-badge.low {
            background: var(--match-low);
        }

        .card-content {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .movie-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            margin: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 4. Error Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: -400px;
            background: rgba(220, 38, 38, 0.95);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            max-width: 350px;
            border-left: 4px solid #ef4444;
        }

        .toast.show {
            right: 24px;
        }

        .toast-icon {
            font-size: 1.35rem;
        }

        .toast-message {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.9rem;
            background-color: #07070b;
        }

        footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- 1. Hero Section -->
    <header class="hero">
        <div class="hero-content">
            <h1><span>🎬</span> CineMatch</h1>
            <p>Discover movies you'll love</p>
        </div>
    </header>

    <!-- 2. Search Section -->
    <div class="search-section">
        <form id="search-form" class="search-form" autocomplete="off">
            <input 
                type="text" 
                id="search-input" 
                class="search-input" 
                placeholder="Enter a movie you like..." 
                list="movie-list" 
                required
            >
            <datalist id="movie-list">
                <!-- Populated dynamically -->
            </datalist>
            <button type="submit" class="search-button">
                <span>🔍</span> Find Similar
            </button>
        </form>
    </div>

    <!-- Spinner -->
    <div id="spinner" class="spinner-container">
        <div class="spinner"></div>
        <div class="spinner-text">Analyzing your taste...</div>
    </div>

    <!-- 3. Results Section -->
    <main id="results-section" class="results-section">
        <div class="results-header">
            <h2>Similar Movies</h2>
        </div>
        <div id="results-grid" class="results-grid">
            <!-- Movie cards injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>Powered by Content-Based Filtering & Cosine Similarity</p>
    </footer>

    <!-- 4. Error Toast -->
    <div id="toast" class="toast">
        <span class="toast-icon">⚠️</span>
        <span class="toast-message">Movie not found. Try another title.</span>
    </div>

    <script>
        // Use relative path if served by backend, or fallback to 127.0.0.1:8000 if opened directly as file
        const API = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';

        document.addEventListener('DOMContentLoaded', () => {
            const searchForm = document.getElementById('search-form');
            const searchInput = document.getElementById('search-input');
            const movieDatalist = document.getElementById('movie-list');
            const resultsSection = document.getElementById('results-section');
            const resultsGrid = document.getElementById('results-grid');
            const spinner = document.getElementById('spinner');

            // Populate autocomplete datalist on load
            fetch(`${API}/movies`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch movies list');
                    }
                    return response.json();
                })
                .then(movies => {
                    // Populate datalist options
                    movies.forEach(title => {
                        const option = document.createElement('option');
                        option.value = title;
                        movieDatalist.appendChild(option);
                    });
                })
                .catch(err => {
                    console.error('Error populating autocomplete:', err);
                });

            // Form submission handler
            searchForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const movieTitle = searchInput.value.trim();
                if (!movieTitle) return;

                // Hide results and show spinner
                resultsSection.style.display = 'none';
                resultsGrid.innerHTML = '';
                spinner.style.display = 'flex';

                // Fetch recommendations
                fetch(`${API}/recommend`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        movie_title: movieTitle,
                        n: 8
                    })
                })
                .then(async response => {
                    spinner.style.display = 'none';
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.detail || 'Movie not found. Try another title.');
                    }
                    return response.json();
                })
                .then(recommendations => {
                    if (!recommendations || recommendations.length === 0) {
                        showToast('No recommendations found for this movie.');
                        return;
                    }

                    // Render recommendations
                    resultsSection.style.display = 'block';
                    
                    recommendations.forEach((movie, index) => {
                        const card = createMovieCard(movie);
                        resultsGrid.appendChild(card);

                        // Staggered fade-in animation (80ms interval)
                        setTimeout(() => {
                            card.classList.add('visible');
                        }, index * 80);
                    });
                })
                .catch(err => {
                    spinner.style.display = 'none';
                    showToast(err.message || 'Movie not found. Try another title.');
                });
            });

            // Helper to generate a movie card element
            function createMovieCard(movie) {
                const card = document.createElement('div');
                card.className = 'movie-card';

                // Determine badge score category
                const score = movie.score;
                let scoreClass = 'low';
                if (score > 0.7) {
                    scoreClass = 'high';
                } else if (score >= 0.4) {
                    scoreClass = 'mid';
                }

                const matchPercentage = Math.round(score * 100);
                const hasPoster = !!movie.poster_path;
                const posterUrl = hasPoster ? movie.poster_path : '';

                card.innerHTML = `
                    <div class="poster-container">
                        <div class="poster-fallback">
                            <span class="fallback-icon">🎬</span>
                            <span class="fallback-title">${escapeHtml(movie.title)}</span>
                        </div>
                        ${hasPoster ? `
                        <img 
                            class="movie-poster" 
                            src="${posterUrl}" 
                            alt="${escapeHtml(movie.title)}" 
                            onload="this.previousElementSibling.style.opacity = 0;" 
                            onerror="this.style.display = 'none'; this.previousElementSibling.style.opacity = 1;"
                        >
                        ` : ''}
                        <div class="score-badge ${scoreClass}">${matchPercentage}% match</div>
                    </div>
                    <div class="card-content">
                        <h3 class="movie-title" title="${escapeHtml(movie.title)}">${escapeHtml(movie.title)}</h3>
                    </div>
                `;

                return card;
            }

            // Show error toast
            function showToast(message) {
                const toast = document.getElementById('toast');
                const toastMessage = toast.querySelector('.toast-message');
                toastMessage.textContent = message;
                
                toast.classList.add('show');
                
                // Auto dismiss after 3 seconds
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
            }

            // HTML Escaper for security (XSS protection)
            function escapeHtml(str) {
                if (!str) return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }
        });
    </script>
</body>
</html>
